name: Python Tests
on:
  push:
    branches: [main, dev]
    paths: ["07_capstone/src/**", "**/exercises/*.py"]
  pull_request:
    branches: [main]
    paths: ["07_capstone/src/**", "**/exercises/*.py"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: pytest 07_capstone/src/ || echo "No tests yet"
