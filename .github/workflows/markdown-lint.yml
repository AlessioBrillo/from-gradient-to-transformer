name: Markdown Lint

on:
  push:
    branches: [dev]
    paths: ['*.md', '**/*.md', '.markdownlint*']
  pull_request:
    branches: [main, dev]
    paths: ['*.md', '**/*.md', '.markdownlint*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            !.github/**/*.md
            !LICENSE
            **/*.md
